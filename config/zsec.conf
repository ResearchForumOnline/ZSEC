# ZSEC Auto Updates configuration.

# Apply safe kernel/network sysctl hardening.
ZSEC_APPLY_SYSCTL=1

# Values: 0, 1, auto
# auto disables unprivileged user namespaces only when common container runtimes
# are not detected.
ZSEC_DISABLE_UNPRIVILEGED_USERNS=auto

# Configure fail2ban for SSH when available.
ZSEC_ENABLE_FAIL2BAN=1

# Add allow rules for the detected admin SSH IP only if a supported firewall is
# already active. This never adds deny rules. Disabled by default to avoid
# surprising network changes.
ZSEC_FIREWALL_GUARD=0

# Local-only audit for exposed AI/dev service ports. No network API is opened.
ZSEC_AI_AUDIT=1

# Optional immutable bit on runtime files. Off by default because it can make
# legitimate updates harder.
ZSEC_TAMPER_LOCK=0

# Minimum free MB required on / before running.
ZSEC_MIN_FREE_MB=512
